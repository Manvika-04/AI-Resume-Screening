<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ATS Results</title>

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <!-- Heading -->

        <h1>
            Resume Screening Results
        </h1>

        <p class="subtitle">
            ATS scores calculated based on job description similarity.
        </p>

        <!-- Results Table -->

        <table>

            <thead>

                <tr>

                    <th>
                        Resume Name
                    </th>

                    <th>
                        ATS Score
                    </th>

                </tr>

            </thead>

            <tbody>

                {% for result in results %}

                <tr>

                    <td>
                        {{ result.filename }}
                    </td>

                    <td>
                        {{ result.score }}%
                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

        <!-- Back Button -->

        <div class="back-btn">

            <a href="/">

                Analyze More Resumes

            </a>

        </div>

    </div>

</body>

</html>
